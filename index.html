<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
             font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="card w-96 bg-white shadow-xl p-8 border border-gray-100">
        <div class="flex flex-col items-center mb-6">
            <img src="assets/github-logo.png" alt="Logo" class="w-16 mb-4"> <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <div class="form-control w-full mb-4">
            <label class="label"><span class="label-text text-[#3D3746] font-semibold">Username</span></label>
            <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" />
            <span class="text-xs text-[#4A00FF] mt-1">Default: admin</span>
        </div>

        <div class="form-control w-full mb-6">
            <label class="label"><span class="label-text font-semibold text-[#3D3746]">Password</span></label>
            <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
            <span class="text-xs text-[#4A00FF] mt-1">Default: admin123</span>
        </div>

        <button onclick="handleLogin()" class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700 text-white">Sign In</button>

        <div class="divider text-xs text-gray-400">OR</div>

        <div class="bg-gray-50 p-4 rounded-lg text-center">
            <p class="text-xs font-bold text-gray-600 mb-1">Demo Credentials:</p>
            <p class="text-xs text-gray-500">Username: <span class="font-mono">admin</span></p>
            <p class="text-xs text-gray-500">Password: <span class="font-mono">admin123</span></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
             font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="navbar justify-between bg-white  px-4 lg:px-20 py-4">
        <div class="flex">
            <img src="assets/github-logo.png" alt="Logo" class="w-8 mr-2">
            <a class="text-xl font-bold">Issues Tracker</a>
        </div>
        <div class="flex-none gap-2">
            <div class="join">
                <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered join-item w-40 lg:w-80" />
                <button onclick="handleSearch()" class="btn btn-primary join-item bg-indigo-600 border-none">Search</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 lg:p-12">
        <section class="toggle-section bg-white flex  rounded-lg shadow-sm w-full lg:w-auto sm:space-y-2 mb-4">
            <div class="flex  gap-2  py-2   bg-gray-50 p-1 rounded-lg ">
            <button onclick="filterIssues('all', this)" 
                class="tab-btn px-8 py-2 rounded-md text-sm font-semibold transition-all bg-[#5D00FF] text-white shadow-md">
                All
            </button>
            <button onclick="filterIssues('open', this)" class=" tab-btn border border-gray-300 px-8 py-2 rounded-md text-sm font-semibold text-gray-500  transition-all">
                Open
            </button>
            <button onclick="filterIssues('closed', this)" 
                class="tab-btn w-full border border-gray-300 px-8 py-2 rounded-md text-sm font-semibold text-gray-500 transition-all">
                Closed
            </button>
        </div>
        </section>
        <section>
            <div class="flex   items-center flex-col space-y-2 sm:flex-row gap-6 bg-white p-3 rounded-lg justify-between  shadow-sm w-full lg:w-auto mb-4">
                <div class="flex items-center gap-2">
                    <img src="assets/Aperture.png" class="w-5" alt="Icon">
                    <span id="issueCount" class="font-bold">0 Issues</span>
                </div>
                <div class="flex gap-4 text-xs font-semibold">
                    <span class="text-green-600 flex items-center gap-1">● Open</span>
                    <span class="text-purple-600 flex items-center gap-1">● Closed</span>
                </div>
                </div>
        </section>
        <section class="loader-section">
            <div id="loader" class="hidden flex justify-center py-20">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
        </section>

        <section class="issue-section">
            <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        </section>
    </main>
    <dialog id="issueModal" class="modal">
        <div class="modal-box w-11/12 max-w-3xl">
            <div id="modalContent"></div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary bg-indigo-600 border-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
